services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: accounts_portal_backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - uploads_data:/app/uploads
    networks:
      - portal_net
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:5000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: accounts_portal_frontend
    restart: unless-stopped
    ports:
      - "8888:80"
      - "8443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - portal_net
volumes:
  uploads_data:
    driver: local
networks:
  portal_net:
    driver: bridge
