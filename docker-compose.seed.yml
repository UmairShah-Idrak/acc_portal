# Run once to seed the admin user:
# docker compose -f docker-compose.yml -f docker-compose.seed.yml run --rm seed

services:
  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: accounts_portal_seed
    env_file:
      - .env
    command: ["node", "src/seed.js"]
    networks:
      - portal_net

networks:
  portal_net:
    driver: bridge
